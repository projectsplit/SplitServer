name: Deploy Production

on:
  workflow_dispatch:

run-name: Deploy Production ${{ github.ref_name }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_APP_DIR: /home/user/buqs/production/api
      APP_PORT: 5097
      DOCKER_REPO: ghcr.io/projectsplit/splitserver
      CONTAINER_NAME: splitserver

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script_stop: true
          script: |
            TAG=${{ github.ref_name }}
            echo $TAG

            DOCKER_TAG=$(echo "$TAG" | tr '/' '-')
            echo $DOCKER_TAG

            cd ${{ env.SERVER_APP_DIR }}

            rm -rf src_temp || true
            git clone -b $TAG --depth 1 https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git src_temp
            docker build -t ${{ env.DOCKER_REPO }}:$DOCKER_TAG src_temp
            rm -rf src_temp

            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --network host \
              -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} \
              -v $(pwd)/appsettings.Production.json:/app/appsettings.Production.json \
              -e ASPNETCORE_URLS="http://0.0.0.0:${{ env.APP_PORT }}" \
              -e ASPNETCORE_ENVIRONMENT=Production \
              --restart always \
              ${{ env.DOCKER_REPO }}:$DOCKER_TAG
            docker images ${{ env.DOCKER_REPO }} --format '{{.Repository}}:{{.Tag}}' | grep -v -F -x -f <(docker ps -q | xargs -n 1 docker inspect --format '{{.Config.Image}}') | xargs -r docker rmi || true
